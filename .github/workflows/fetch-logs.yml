# ──────────────────────────────────────────────────────────────────────────────
# fetch-logs.yml — Fetch container logs from VPS
# ──────────────────────────────────────────────────────────────────────────────

name: Fetch Logs

on:
  workflow_dispatch:

jobs:
  logs:
    name: Get container logs
    runs-on: ubuntu-latest
    steps:
      - name: Fetch recent logs
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_PATH }}"

            echo "=== CONTAINER STATUS ==="
            docker inspect --format='State: {{.State.Status}} | Started: {{.State.StartedAt}}' sauce 2>/dev/null || echo "Container not found"

            echo ""
            echo "=== .ENV SNAPSHOT ==="
            grep -E '^(TRADING_UNIVERSE|TRADING_PAUSE|ALPACA_PAPER|LLM_MODEL)' .env 2>/dev/null || echo "No .env"

            echo ""
            echo "=== LAST 80 LOG LINES ==="
            docker logs sauce --tail 80 2>&1 || echo "Cannot read logs"
