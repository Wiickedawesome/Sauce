# ──────────────────────────────────────────────────────────────────────────────
# update-env.yml — Push .env to VPS and restart container
#
# Triggered manually via workflow_dispatch.
# Writes the DOTENV_CONTENT secret to the VPS and restarts the container.
# ──────────────────────────────────────────────────────────────────────────────

name: Update .env

on:
  workflow_dispatch:

jobs:
  update:
    name: Push .env & restart
    runs-on: ubuntu-latest
    steps:
      - name: Write .env and restart container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOTENV_CONTENT
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_PATH }}"

            echo "--- writing .env ---"
            printf '%s\n' "${DOTENV_CONTENT}" > .env
            echo "--- .env written ($(wc -l < .env) lines) ---"

            echo "--- restarting container ---"
            docker compose -f docker/docker-compose.yml up --build -d

            echo "--- checking container state ---"
            sleep 5
            STATE=$(docker inspect --format='{{.State.Status}}' sauce 2>/dev/null || echo "missing")
            echo "Container state: ${STATE}"
            if [[ "${STATE}" != "running" ]]; then
              echo "ERROR: container not running (state=${STATE})"
              docker compose -f docker/docker-compose.yml logs --tail=30 || true
              exit 1
            fi

            echo "--- verifying .env content ---"
            grep -c 'TRADING_UNIVERSE_CRYPTO' .env && echo "Crypto universe present"
            echo "--- done ---"
        env:
          DOTENV_CONTENT: ${{ secrets.DOTENV_CONTENT }}
