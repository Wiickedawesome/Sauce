# ──────────────────────────────────────────────────────────────────────────────
# deploy.yml — CI/CD pipeline for Sauce
#
# Triggers:  push to main
# Jobs:      test → deploy → verify
#
# Required GitHub repository secrets:
#   DO_HOST      — droplet IP or hostname
#   DO_USER      — SSH user (e.g. root)
#   DO_SSH_KEY   — full PEM content of the deploy private key
#   DO_APP_PATH  — absolute path on droplet (e.g. /root/Sauce)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Run test suite ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Run tests
        run: pytest --tb=short -q

  # ── 2. Deploy to droplet ─────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Pull & rebuild on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DO_APP_PATH }}"
            echo "--- git pull ---"
            git pull origin main
            echo "--- docker compose up --build -d ---"
            docker compose -f docker/docker-compose.yml up --build -d
            echo "--- deploy complete ---"

  # ── 3. Verify container is running ───────────────────────────────────────────
  verify:
    name: Verify
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check container state
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            STATE=$(docker inspect --format='{{.State.Status}}' sauce 2>/dev/null || echo "missing")
            echo "Container state: ${STATE}"
            if [[ "${STATE}" != "running" ]]; then
              echo "ERROR: container is not running after deploy (state=${STATE})"
              echo "--- last 50 log lines ---"
              docker compose -f "${{ secrets.DO_APP_PATH }}/docker/docker-compose.yml" logs --tail=50 || true
              exit 1
            fi
            echo "OK: container is running"
