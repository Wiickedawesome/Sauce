# CI — Runs tests on push and pull requests

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.lock
            pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.lock
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy sauce --ignore-missing-imports

      - name: Test
        env:
          # Tests use isolated tmp DBs, but set dummy values to avoid config errors
          ALPACA_API_KEY: "test-key"
          ALPACA_SECRET_KEY: "test-secret"
          ANTHROPIC_API_KEY: "test-key"
        run: pytest -v --tb=short
